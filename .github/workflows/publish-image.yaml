name: Build and Push NemoClaw Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase repository owner
        id: lowercase
        run: |
          echo "gh_owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract git commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          docker buildx build \
            --tag ghcr.io/${{ steps.lower.outputs.gh_owner }}/nemoclaw:latest \
            --tag ghcr.io/${{ steps.lower.outputs.gh_owner }}/nemoclaw:${{ steps.sha.outputs.sha }} \
            --push \
            .
